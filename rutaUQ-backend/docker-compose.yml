version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rutauq_postgres
    environment:
      POSTGRES_DB: rutauq_db
      POSTGRES_USER: rutauq_user
      POSTGRES_PASSWORD: rutauq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rutauq_user -d rutauq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
